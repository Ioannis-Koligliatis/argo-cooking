apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: ioannis-api
  labels:
    app: ioannis-api
    owner: ioannis

spec:
  replicas: 2
  selector:
    matchLabels:
      app: ioannis-api
  strategy:
    type: Recreate

  template:
    metadata:
      name: nginx
      namespace: ioannis-api
      labels:
        app: ioannis-api
        owner: ioannis
    spec:
      restartPolicy: Always

      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80
          resources:
            limits:
              memory: "128Mi"
              cpu: "500m"
            requests:
              memory: "64Mi"
              cpu: "250m"